services:
  - type: web
    name: ecobid-staging
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/backend/database.sqlite
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PASSWORD_RESET_CODE_TTL_MINUTES
        value: "15"
      - key: PASSWORD_RESET_MAX_ATTEMPTS
        value: "5"
      - key: PASSWORD_RESET_RETURN_CODE
        value: "false"
      - key: ADMIN_EMAILS
        value: admin1@inha.edu
      - key: AI_MISSION_AUTO_APPROVE_CONFIDENCE
        value: "0.85"
      - key: GEMINI_MISSION_VERIFICATION_MODEL
        value: gemini-2.5-flash-lite
